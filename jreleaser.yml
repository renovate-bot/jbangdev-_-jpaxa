matrix:
  rows:
    - { goos: darwin,  goarch: amd64,  platform: osx-x86_64, ext: "" }
    - { goos: darwin,  goarch: arm64,  platform: osx-aarch_64, ext: "" }
    - { goos: linux,   goarch: amd64,  platform: linux-x86_64, ext: "" }
    - { goos: linux,   goarch: arm64,  platform: linux-aarch_64, ext: "" }
    - { goos: linux,   goarch: arm,    platform: linux-arm_32, ext: "" }
    - { goos: windows, goarch: amd64, platform: windows-x86_64, ext: ".exe" }

hooks:
  script:
    before:
      - run: |
           rm -rf build/stubs/
           rm -rf build/jpaxa/
           mkdir -p build/stubs
        filter:
          includes: ['assemble']
      - run: |
          go build -o build/stubs/stub-{{matrix.platform}} stub.go
          {
            echo ""
            echo "JPAXAJPAXAJPAXA"
          } >> build/stubs/stub-{{matrix.platform}}
          echo "{{matrix.goos}} {{matrix.goarch}} {{matrix.platform}}" >> build/stubs/platforms.txt
        environment:
          GOOS: "{{matrix.goos}}"
          GOARCH: "{{matrix.goarch}}"
          CGO_ENABLED: "0"
        applyDefaultMatrix: true
        filter:
          includes: ['assemble']
      - run: ./build-jpaxa.sh
        filter:
          includes: ['assemble']
          
project:
  name: jpaxa
  version: 999-SNAPSHOT
  description: A port of jpaxa to Java - a tool to package any runtime or script dependent applications into self-extracting executable binaries/bundles
  authors:
    - jbangdev
  license: MIT
  copyright: Copyright 2026 jbangdev
  links:
    homepage: https://github.com/jbangdev/jpaxa
    documentation: https://github.com/jbangdev/jpaxa#readme
  snapshot:
    label: early-access
    fullChangelog: true

release:
  github:
    owner: jbangdev
    name: jpaxa
    overwrite: true
    skipTag: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        enabled: false

files:
  artifacts:
    - path: build/jpaxa/jpaxa.jar
    - path: build/jpaxa-output/jpaxa-osx-x86_64
    - path: build/jpaxa-output/jpaxa-osx-aarch_64
    - path: build/jpaxa-output/jpaxa-linux-x86_64
    - path: build/jpaxa-output/jpaxa-linux-aarch_64
    - path: build/jpaxa-output/jpaxa-linux-arm_32
    - path: build/jpaxa-output/jpaxa-windows-x86_64.exe





